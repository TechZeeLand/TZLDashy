##################################################################
#  TZLDashy — Nginx virtual host  (port 1011)
#  PHP-FPM co-located at 127.0.0.1:9000
##################################################################

server {
    listen      1011;
    server_name _;

    root    /app/public;
    index   index.php index.html;

    charset utf-8;
    client_max_body_size 50M;

    # Log to stderr/stdout — visible via: docker logs tzldashy_app
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Static assets ────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Auth / API / pages / partials → /app/<dir>/<file>.php ───
    location ~ ^/(auth|api|pages|partials)/(.+\.php)$ {
        fastcgi_pass            127.0.0.1:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME /app/$1/$2;
        fastcgi_param           DOCUMENT_ROOT   /app;
        include                 fastcgi_params;
        fastcgi_read_timeout    300;
        fastcgi_buffer_size     128k;
        fastcgi_buffers         4 256k;
    }

    # ── PHP files served from /app/public (e.g. app-placeholder.php) ──
    location ~ \.php$ {
        try_files               $uri =404;
        fastcgi_pass            127.0.0.1:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME /app/public$fastcgi_script_name;
        fastcgi_param           DOCUMENT_ROOT   /app/public;
        include                 fastcgi_params;
        fastcgi_read_timeout    60;
    }

    # ── Everything else → front controller (public/index.php stub) ─
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Block dotfiles ────────────────────────────────────────────
    location ~ /\. { deny all; }
}
