##################################################################
#  TZLDashy — Nginx virtual host
#  Runs on port 1011 inside the combined app container.
#  PHP-FPM is co-located, so fastcgi_pass uses 127.0.0.1:9000.
##################################################################

server {
    listen 1011;
    server_name _;

    root /app/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 50M;

    # ── Security headers ────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header X-XSS-Protection         "1; mode=block"                     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;

    # ── Static assets (long cache) ──────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Auth / API / pages / partials — path-mapped PHP ─────────
    location ~ ^/(auth|api|pages|partials)/(.+\.php)$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME /app/$1/$2;
        fastcgi_param  DOCUMENT_ROOT   /app/public;
        include        fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size  128k;
        fastcgi_buffers      4 256k;
    }

    # ── Root PHP files (index.php, etc.) ────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME /app/public$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   /app/public;
        include        fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size  128k;
        fastcgi_buffers      4 256k;
    }

    # ── Front controller ────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Block dotfiles and sensitive files ──────────────────────
    location ~ /\.                                         { deny all; }
    location ~* /(config\.php|composer\.(json|lock)|\.env)$ { deny all; }

    access_log /var/log/nginx/tzldashy_access.log;
    error_log  /var/log/nginx/tzldashy_error.log warn;
}
