##################################################################
#  TZLDashy — Nginx virtual host  (port 1011)
#  PHP-FPM is co-located at 127.0.0.1:9000
##################################################################

server {
    listen 1011;
    server_name _;

    root    /app/public;
    index   index.html;

    charset utf-8;
    client_max_body_size 50M;

    # ── Security headers ────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Static assets ───────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Dashboard root → /app/index.php ─────────────────────────
    # The main index.php lives outside /app/public, so handle it explicitly
    location = / {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_param  SCRIPT_FILENAME /app/index.php;
        fastcgi_param  DOCUMENT_ROOT   /app;
        include        fastcgi_params;
        fastcgi_read_timeout 60;
        fastcgi_buffer_size  128k;
        fastcgi_buffers      4 256k;
    }

    location = /index.php {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_param  SCRIPT_FILENAME /app/index.php;
        fastcgi_param  DOCUMENT_ROOT   /app;
        include        fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # ── Auth / API / pages / partials ────────────────────────────
    location ~ ^/(auth|api|pages|partials)/(.+\.php)$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_param  SCRIPT_FILENAME /app/$1/$2;
        fastcgi_param  DOCUMENT_ROOT   /app;
        include        fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size  128k;
        fastcgi_buffers      4 256k;
    }

    # ── PHP files served from /app/public (e.g. app-placeholder.php) ─
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_param  SCRIPT_FILENAME /app/public$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   /app/public;
        include        fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # ── Front controller ────────────────────────────────────────
    location / {
        try_files $uri $uri/ @notfound;
    }

    location @notfound {
        return 302 /;
    }

    # ── Block dotfiles and sensitive paths ───────────────────────
    location ~ /\.                                          { deny all; }
    location ~* /(config\.php|composer\.(json|lock)|\.env)$ { deny all; }

    access_log /var/log/nginx/tzldashy_access.log;
    error_log  /var/log/nginx/tzldashy_error.log warn;
}
